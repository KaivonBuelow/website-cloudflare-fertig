
<!DOCTYPE html>
<html lang="de" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VBC | von Bülow Consulting - Strategische KI-Partner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --scroll-y: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #010409;
            color: #f8fafc;
            overflow-x: hidden;
        }
        h1, h2, h3, .font-heading { font-family: 'Plus+Jakarta+Sans', sans-serif; }
        .glass {
            background: rgba(15, 23, 42, 0.3);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .bg-mesh {
            background-image: radial-gradient(at 0% 0%, hsla(222,47%,11%,1) 0, transparent 50%), 
                              radial-gradient(at 100% 0%, hsla(217,91%,60%,0.05) 0, transparent 50%), 
                              radial-gradient(at 100% 100%, hsla(222,47%,11%,1) 0, transparent 50%), 
                              radial-gradient(at 0% 100%, hsla(217,91%,60%,0.05) 0, transparent 50%);
        }
        @keyframes float-slow {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(5deg); }
        }
        .animate-float { animation: float-slow 8s infinite ease-in-out; }
        
        .parallax-target {
            transform: translateY(calc(var(--scroll-y) * -0.15px)) rotate(calc(var(--scroll-y) * 0.02deg));
        }
        .parallax-reverse {
            transform: translateY(calc(var(--scroll-y) * 0.1px)) scale(calc(1 + var(--scroll-y) * 0.0002));
        }
        
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }
        .glow-sphere { animation: pulse-glow 10s infinite alternate ease-in-out; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #010409; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3b82f6; }
    </style>

</head>

</html>
